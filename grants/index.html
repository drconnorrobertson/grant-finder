<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search and filter through thousands of nonprofit grants across the USA. Find federal, state, foundation, and corporate grants. A free tool by Dr. Connor Robertson.">
    <meta name="author" content="Dr. Connor Robertson">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://grantfinder.app/grants/">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Grant Database - Search Nonprofit Grants | GrantFinder">
    <meta property="og:description" content="Search and filter through thousands of nonprofit grants across the USA. Find federal, state, foundation, and corporate grants. A free tool by Dr. Connor Robertson.">
    <meta property="og:url" content="https://grantfinder.app/grants/">
    <meta property="og:site_name" content="GrantFinder">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Grant Database - Search Nonprofit Grants | GrantFinder">
    <meta name="twitter:description" content="Search and filter through thousands of nonprofit grants across the USA. Find federal, state, foundation, and corporate grants. A free tool by Dr. Connor Robertson.">
    <title>Grant Database - Search Nonprofit Grants | GrantFinder</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231a1a2e' width='100' height='100'/><text x='50' y='70' font-size='60' font-weight='bold' fill='%2300b4d8' text-anchor='middle'>G</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="page-hero">
        <div class="container">
            <h1>Grant Database</h1>
            <p>Search and filter through hundreds of grants to find the perfect funding opportunity</p>
        </div>
    </div>

    <main class="section" style="padding-top:32px;">
        <div class="container">
            <div class="filters-section">
                <div class="filter-group" style="margin-bottom:12px;">
                    <label for="searchInput">Search</label>
                    <input type="text" id="searchInput" placeholder="Search by grant name, funder, or keyword...">
                </div>
                <div class="filters-row">
                    <div class="filter-group">
                        <label for="categoryFilter">Category</label>
                        <select id="categoryFilter"><option value="">All Categories</option></select>
                    </div>
                    <div class="filter-group">
                        <label for="stateFilter">State</label>
                        <select id="stateFilter"><option value="">All States</option><option value="National">National Only</option></select>
                    </div>
                    <div class="filter-group">
                        <label for="amountMin">Min Funding ($)</label>
                        <input type="number" id="amountMin" placeholder="e.g. 10000">
                    </div>
                    <div class="filter-group">
                        <label for="amountMax">Max Funding ($)</label>
                        <input type="number" id="amountMax" placeholder="e.g. 500000">
                    </div>
                    <div class="filter-group">
                        <label for="sortSelect">Sort By</label>
                        <select id="sortSelect">
                            <option value="deadline-asc">Deadline (Soonest)</option>
                            <option value="amount-desc">Amount (Highest)</option>
                            <option value="amount-asc">Amount (Lowest)</option>
                            <option value="recent">Recently Added</option>
                        </select>
                    </div>
                    <div class="filters-actions">
                        <button id="resetButton" class="btn btn-secondary btn-sm">Reset</button>
                    </div>
                </div>
            </div>

            <div class="results-info">
                <span id="resultsText">Showing 0 grants</span>
                <span id="resultsCount"></span>
            </div>

            <div id="grantsGrid" class="grants-grid"></div>
            <div id="pagination" class="pagination"></div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="/data/grants.js"></script>
    <script src="/js/schema.js"></script>
    <script src="/js/app.js"></script>
    <script>
    (function() {
        const PER_PAGE = 12;
        let currentPage = 1;
        let filtered = [];

        // Init
        document.addEventListener('DOMContentLoaded', function() {
            // Navbar & footer
            
            // Inject structured data
            if (typeof injectSchemaAndMeta === 'function') {
                injectSchemaAndMeta({
                    isHome: false,
                    breadcrumbs: [{"name": "Home", "url": "https://grantfinder.app/"}, {"name": "Grants", "url": "https://grantfinder.app/grants/"}]
                });
            }
            document.getElementById('navbar').innerHTML = getNavbarHTML('grants');
            document.getElementById('footer').innerHTML = getFooterHTML();

            // Populate category dropdown
            const catSel = document.getElementById('categoryFilter');
            CATEGORIES.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                catSel.appendChild(opt);
            });

            // Populate state dropdown
            const stateSel = document.getElementById('stateFilter');
            US_STATES.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.abbr; opt.textContent = s.name;
                stateSel.appendChild(opt);
            });

            // Read URL params
            const params = new URLSearchParams(window.location.search);
            if (params.get('q')) document.getElementById('searchInput').value = params.get('q');
            if (params.get('category')) catSel.value = params.get('category');
            if (params.get('state')) stateSel.value = params.get('state');

            // Bind events
            let debounceTimer;
            document.getElementById('searchInput').addEventListener('input', function() {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(applyFilters, 300);
            });
            ['categoryFilter','stateFilter','amountMin','amountMax','sortSelect'].forEach(id => {
                document.getElementById(id).addEventListener('change', applyFilters);
            });
            document.getElementById('resetButton').addEventListener('click', function() {
                document.getElementById('searchInput').value = '';
                catSel.value = '';
                stateSel.value = '';
                document.getElementById('amountMin').value = '';
                document.getElementById('amountMax').value = '';
                document.getElementById('sortSelect').value = 'deadline-asc';
                window.history.replaceState({}, '', window.location.pathname);
                applyFilters();
            });

            applyFilters();
        });

        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const cat = document.getElementById('categoryFilter').value;
            const state = document.getElementById('stateFilter').value;
            const minAmt = parseFloat(document.getElementById('amountMin').value) || 0;
            const maxAmt = parseFloat(document.getElementById('amountMax').value) || Infinity;
            const sort = document.getElementById('sortSelect').value;

            filtered = GRANTS_DATA.filter(g => {
                // Text search
                if (q && !(
                    g.title.toLowerCase().includes(q) ||
                    g.funder.toLowerCase().includes(q) ||
                    g.description.toLowerCase().includes(q) ||
                    g.category.toLowerCase().includes(q)
                )) return false;

                // Category
                if (cat && g.category !== cat) return false;

                // State
                if (state === 'National' && !g.states.includes('National')) return false;
                if (state && state !== 'National' && !g.states.includes(state) && !g.states.includes('National')) return false;

                // Amount range
                if (g.amountMax < minAmt) return false;
                if (g.amountMin > maxAmt) return false;

                return true;
            });

            // Sort
            filtered.sort((a, b) => {
                switch(sort) {
                    case 'deadline-asc':
                        const dA = a.deadline === 'Rolling' ? '9999-12-31' : a.deadline;
                        const dB = b.deadline === 'Rolling' ? '9999-12-31' : b.deadline;
                        return dA.localeCompare(dB);
                    case 'amount-desc':
                        return b.amountMax - a.amountMax;
                    case 'amount-asc':
                        return a.amountMin - b.amountMin;
                    case 'recent':
                        return (b.dateAdded || '').localeCompare(a.dateAdded || '');
                    default: return 0;
                }
            });

            currentPage = 1;
            render();
        }

        function render() {
            const grid = document.getElementById('grantsGrid');
            const total = filtered.length;
            const totalPages = Math.ceil(total / PER_PAGE);
            const start = (currentPage - 1) * PER_PAGE;
            const pageGrants = filtered.slice(start, start + PER_PAGE);

            // Results info
            if (total === 0) {
                document.getElementById('resultsText').textContent = 'No grants match your filters';
            } else {
                document.getElementById('resultsText').innerHTML =
                    'Showing <strong>' + (start + 1) + '-' + Math.min(start + PER_PAGE, total) + '</strong> of <strong>' + total + '</strong> grants';
            }

            // Render cards
            if (total === 0) {
                grid.innerHTML = '<div class="empty-state"><h3>No grants found</h3><p>Try adjusting your search or filters to find more results.</p></div>';
            } else {
                grid.innerHTML = pageGrants.map(g => renderGrantCard(g)).join('');
            }

            // Pagination
            const pag = document.getElementById('pagination');
            if (totalPages <= 1) { pag.innerHTML = ''; return; }

            let html = '<button ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="window._gfPage(' + (currentPage-1) + ')">Previous</button>';
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="window._gfPage(' + i + ')">' + i + '</button>';
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += '<span style="padding:8px 4px;color:var(--gray-400);">...</span>';
                }
            }
            html += '<button ' + (currentPage === totalPages ? 'disabled' : '') + ' onclick="window._gfPage(' + (currentPage+1) + ')">Next</button>';
            pag.innerHTML = html;
        }

        window._gfPage = function(page) {
            currentPage = page;
            render();
            window.scrollTo({ top: 300, behavior: 'smooth' });
        };
    })();
    </script>
</body>
</html>
