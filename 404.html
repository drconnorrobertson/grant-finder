<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found. GrantFinder is a free nonprofit grant discovery platform. Find the grants you need.">
    <meta name="robots" content="noindex, follow">
    <title>404 - Page Not Found | GrantFinder</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231a1a2e' width='100' height='100'/><text x='50' y='70' font-size='60' font-weight='bold' fill='%2300b4d8' text-anchor='middle'>G</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error-container { max-width: 600px; margin: 120px auto; padding: 40px 24px; text-align: center; }
        .error-code { font-size: 5rem; font-weight: 800; color: var(--teal, #00b4d8); margin-bottom: 16px; }
        .error-title { font-size: 1.8rem; color: var(--navy, #1a1a2e); margin-bottom: 12px; }
        .error-desc { color: var(--gray-600, #4b5563); font-size: 1rem; line-height: 1.6; margin-bottom: 32px; }
        .error-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .error-btn { display: inline-block; padding: 12px 24px; border-radius: 8px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
        .error-btn-primary { background: var(--teal, #00b4d8); color: white; }
        .error-btn-primary:hover { background: #0099b8; }
        .error-btn-secondary { background: var(--gray-100, #f1f5f9); color: var(--navy, #1a1a2e); }
        .error-btn-secondary:hover { background: var(--gray-200, #e2e8f0); }
    </style>
</head>
<body>
    <nav id="navbar"></nav>

    <main>
        <div class="error-container">
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-desc">We could not find the page you are looking for. It may have been moved or deleted. Please check the URL and try again, or use the links below to get back on track.</p>
            <div class="error-actions">
                <a href="/" class="error-btn error-btn-primary">Back to Home</a>
                <a href="/grants/" class="error-btn error-btn-secondary">Browse Grants</a>
            </div>
        </div>
    </main>

    <footer id="footer"></footer>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof getNavbarHTML === 'function') {
                document.getElementById('navbar').innerHTML = getNavbarHTML('404');
            }
            if (typeof getFooterHTML === 'function') {
                document.getElementById('footer').innerHTML = getFooterHTML();
            }
        });
    </script>
</body>
</html>
