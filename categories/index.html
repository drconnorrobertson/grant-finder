<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse grants organized by category. Explore funding opportunities in Education, Health, Arts & Culture, Environment, and more.">
    <meta name="keywords" content="grants by category, grant categories, funding by focus area, nonprofit grants">
    <meta name="theme-color" content="#2563eb">
    <title>Browse by Category - GrantFinder</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234F46E5' width='100' height='100'/><text x='50' y='70' font-size='60' font-weight='bold' fill='white' text-anchor='middle'>G</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/data/grants.js"></script>
    <script src="/js/app.js"></script>
</head>
<body>
    <!-- Navigation -->
    <div id="navbar"></div>

    <!-- Hero Section -->
    <section class="page-hero">
        <h1>Browse by Category</h1>
        <p class="subtitle">Explore grants organized by focus area</p>
    </section>

    <!-- Main Content -->
    <main class="container">
        <!-- Categories Grid -->
        <section class="section">
            <div class="categories-grid" id="categoriesGridMain"></div>
        </section>

        <!-- Category Sections with Grant Previews -->
        <section class="section" id="categoryDetails"></section>
    </main>

    <!-- Footer -->
    <footer id="footer"></footer>

    <!-- Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Render navbar
            if (typeof getNavbarHTML === 'function') {
                document.getElementById('navbar').innerHTML = getNavbarHTML('categories');
            }

            // Render footer
            if (typeof getFooterHTML === 'function') {
                document.getElementById('footer').innerHTML = getFooterHTML();
            }

            // Render categories grid
            if (typeof CATEGORIES !== 'undefined' && typeof getCategoryIcon === 'function' &&
                typeof getGrantCountByCategory === 'function' && typeof getCategoryColor === 'function') {
                const categoriesContainer = document.getElementById('categoriesGridMain');
                if (categoriesContainer) {
                    categoriesContainer.innerHTML = CATEGORIES
                        .map(category => {
                            const icon = getCategoryIcon(category);
                            const count = getGrantCountByCategory(category);
                            const color = getCategoryColor(category);
                            return `
                                <a href="/grants/?category=${encodeURIComponent(category)}" class="category-card" style="--category-color: ${color};">
                                    <div class="category-icon">${icon}</div>
                                    <h3>${category}</h3>
                                    <p>${count} grants</p>
                                </a>
                            `;
                        })
                        .join('');
                }
            }

            // Render category detail sections
            if (typeof CATEGORIES !== 'undefined' && typeof GRANTS_DATA !== 'undefined' &&
                typeof renderGrantCard === 'function' && typeof getGrantCountByCategory === 'function') {
                const detailsContainer = document.getElementById('categoryDetails');
                if (detailsContainer) {
                    detailsContainer.innerHTML = CATEGORIES
                        .map(category => {
                            const grants = GRANTS_DATA.filter(g => g.category === category);
                            const firstFour = grants.slice(0, 4);
                            const totalCount = grants.length;

                            return `
                                <div class="category-section">
                                    <div class="category-section-header">
                                        <h2>${category}</h2>
                                        <a href="/grants/?category=${encodeURIComponent(category)}" class="view-all-link">View all ${totalCount} grants →</a>
                                    </div>
                                    <div class="grants-grid">
                                        ${firstFour.map(g => renderGrantCard(g)).join('')}
                                    </div>
                                </div>
                            `;
                        })
                        .join('');
                }
            }
        });
    </script>
</body>
</html>
